# Build APK Workflow

name: Build APK

on:
  schedule:
    - cron: '0 0 * * *'  # Run every day at midnight UTC
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK
      uses: actions/setup-java@v1
      with:
        java-version: '11'

    - name: Build APK
      run: |
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v2
      with:
        name: APK
        path: app/build/outputs/apk/release/*.apk

    - name: Notify Success
      run: |
        echo "Build Successful!" | mail -s "Build Notification" youremail@example.com
